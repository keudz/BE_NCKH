app = 'be-nckh'
primary_region = 'sin'

[build]

# 1. THÊM BIẾN MÔI TRƯỜNG ĐỂ TỐI ƯU JAVA
[env]
# Giới hạn RAM cho Java để tránh lỗi Out of Memory (OOM) trên máy 1GB
# TieredStopAtLevel=1 giúp Spring Boot khởi động nhanh hơn rất nhiều
JAVA_OPTS = "-Xms512m -Xmx512m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
# Bắt buộc Spring Boot lắng nghe ở 0.0.0.0 để Fly.io có thể kết nối
SERVER_ADDRESS = "0.0.0.0"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 0
processes = ['app']

# 2. THÊM THỜI GIAN CHỜ (GRACE PERIOD)
[[http_service.checks]]
interval = "15s"
timeout = "5s"
grace_period = "60s" # Báo cho Fly.io đợi tối đa 60 giây để Spring Boot bật xong mới kiểm tra

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
memory_mb = 1024