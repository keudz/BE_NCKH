spring.config.import=optional:file:./.env[.properties]
spring.profiles.active=${ACTIVE_TYPE:dev}
spring.application.name=BEZMA

# Multipart configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.jackson.date-format=dd/MM/yyyy
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.fail-on-empty-beans=false
server.servlet.session.cookie.max-age=604800
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPRIRATION_DEV}
jwt.refresh-expiration = ${JWT_EXPRIRATION_DEV}
spring.data.redis.url=${REDIS_URL}
app.base-url=${APP_BASE_URL}
app.frontend-url=${APP_FRONTEND_URL}


ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
agent.service.url=${AGENT_SERVICE_URL:http://localhost:8001}
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}